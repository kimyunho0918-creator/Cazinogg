<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <title>JS Golden Slot - Ultimate Control Edition</title>
    <style>
        body { font-family: 'Malgun Gothic', sans-serif; text-align: center; background: radial-gradient(circle, #444 0%, #111 100%); color: white; min-height: 100vh; margin: 0; display: flex; flex-direction: column; align-items: center; justify-content: center; overflow: hidden; }
        #entry-screen { background: #333; padding: 50px; border-radius: 30px; box-shadow: 0 0 40px rgba(0,0,0,0.8); border: 8px solid #b8860b; z-index: 10; }
        #game-screen { display: none; }

        .machine-wrapper { display: flex; align-items: center; justify-content: center; perspective: 1000px; padding-right: 60px; }
        .slot-machine { background-color: #333; border: 12px solid #b8860b; border-radius: 30px; padding: 30px; width: 520px; box-shadow: 0 20px 50px rgba(0,0,0,0.8); position: relative; z-index: 2; }

        /* 레버 디자인 */
        .handle-container { width: 60px; height: 200px; position: relative; margin-left: 20px; z-index: 1; }
        .handle-base { width: 30px; height: 80px; background: #222; position: absolute; left: 0; top: 100px; border-radius: 0 10px 10px 0; }
        .handle-stick { width: 18px; height: 140px; background: linear-gradient(to right, #777, #fff, #777); position: absolute; left: 6px; bottom: 80px; border-radius: 10px; transform-origin: bottom center; transition: transform 0.2s; }
        .handle-knob { width: 55px; height: 55px; background: radial-gradient(circle at 30% 30%, #ff4444, #880000); border-radius: 50%; position: absolute; top: -45px; left: -18px; box-shadow: 0 6px 15px rgba(0,0,0,0.6); border: 2px solid #500; }
        .pulling .handle-stick { animation: lever-pull 0.45s ease-in-out; }
        @keyframes lever-pull { 0% { transform: rotateX(0deg); } 40% { transform: rotateX(85deg) scaleY(0.8); } 100% { transform: rotateX(0deg); } }

        /* 상태바 및 릴 */
        .status-bar { display: flex; justify-content: space-between; background: #000; padding: 15px 25px; border-radius: 15px; border: 2px solid #555; margin-bottom: 20px; }
        .status-item { font-size: 20px; color: #ffd700; font-weight: bold; }
        .slot-container { display: flex; justify-content: center; background-color: #eee; padding: 15px; border-radius: 15px; overflow: hidden; }
        .reel-window { width: 110px; height: 110px; border: 4px solid #888; margin: 0 8px; overflow: hidden; position: relative; background: white; border-radius: 8px; }
        .reel-list { list-style: none; margin: 0; padding: 0; position: absolute; width: 100%; top: 0; transition: transform 3s cubic-bezier(0.15, 0, 0.15, 1); }
        .symbol { height: 110px; line-height: 110px; font-size: 70px; color: black; text-align: center; }

        /* 베팅 컨트롤 */
        .bet-section { margin-top: 20px; background: rgba(0,0,0,0.3); padding: 15px; border-radius: 15px; }
        .bet-display-box { margin-bottom: 10px; }
        #bet-input { 
            background: #111; color: #0f0; font-family: 'Courier New', monospace; font-size: 26px; 
            padding: 5px 15px; border: 2px solid #444; border-radius: 5px; width: 150px; text-align: center; 
            outline: none; cursor: text;
        }
        #bet-input:focus { border-color: #0f0; box-shadow: 0 0 10px rgba(0,255,0,0.3); }
        
        .bet-row { display: flex; gap: 5px; justify-content: center; margin-bottom: 5px; }
        .bet-btn { background: #555; border: 1px solid #777; color: white; padding: 6px 10px; border-radius: 5px; cursor: pointer; font-size: 13px; min-width: 55px; }
        .bet-btn.minus { background: #644; }
        .bet-btn.plus { background: #464; }
        .bet-btn.max { background: #b8860b; font-weight: bold; }

        .fancy-btn { padding: 15px 50px; font-size: 24px; font-weight: bold; cursor: pointer; background: linear-gradient(#ffd700, #ff8c00); border: none; border-radius: 50px; color: #222; box-shadow: 0 6px 0 #b8860b; width: 100%; margin-top: 15px; }
        .fancy-btn:active { transform: translateY(4px); box-shadow: 0 2px 0 #b8860b; }
        #message { margin-top: 15px; font-size: 20px; height: 50px; font-weight: bold; }
        .win-text { color: #ffd700; text-shadow: 0 0 10px #ff0; }
    </style>
</head>
<body>

    <div id="entry-screen">
        <h2>🎰 GOLDEN CASINO</h2>
        <div style="margin: 30px 0;">
            <input type="number" id="start-balance" value="10000" style="padding:12px; font-size:24px; width:180px; text-align:center; background:#222; color:#fff; border:3px solid #555; border-radius:10px;">
        </div>
        <button id="start-btn" class="fancy-btn">START GAME</button>
    </div>

    <div id="game-screen">
        <div class="machine-wrapper">
            <div class="slot-machine">
                <h1 style="color: #ffd700; margin: 0 0 15px 0;">🎰 GOLDEN SLOT</h1>
                <div class="status-bar">
                    <div class="status-item">MONEY: <span id="balance">0</span></div>
                    <div style="color: #aaa; font-size: 11px; text-align:right;">7️⃣x5 | 💎x3 | 🍇x2<br>🍋x1.5 | 🍒x1</div>
                </div>
                <div class="slot-container">
                    <div class="reel-window"><ul id="reel1" class="reel-list"></ul></div>
                    <div class="reel-window"><ul id="reel2" class="reel-list"></ul></div>
                    <div class="reel-window"><ul id="reel3" class="reel-list"></ul></div>
                </div>

                <div class="bet-section">
                    <div class="bet-display-box">
                        <span style="font-size:12px; color:#aaa; font-weight:bold;">BET AMOUNT (Click to edit)</span><br>
                        <input type="number" id="bet-input" value="100">
                    </div>
                    <div class="bet-row">
                        <button class="bet-btn minus" onclick="changeBet(-1000)">-1k</button>
                        <button class="bet-btn minus" onclick="changeBet(-500)">-500</button>
                        <button class="bet-btn minus" onclick="changeBet(-100)">-100</button>
                        <button class="bet-btn plus" onclick="changeBet(100)">+100</button>
                        <button class="bet-btn plus" onclick="changeBet(500)">+500</button>
                        <button class="bet-btn plus" onclick="changeBet(1000)">+1k</button>
                    </div>
                    <div class="bet-row">
                        <button class="bet-btn max" onclick="maxBet()" style="flex:1;">MAX (ALL-IN)</button>
                        <button class="bet-btn" onclick="resetBet()" style="flex:1;">RESET</button>
                    </div>
                </div>

                <button id="spin-btn" class="fancy-btn">SPIN! (Space)</button>
                <div id="message">LUCKY DAY!</div>
            </div>

            <div id="handle-container" class="handle-container">
                <div class="handle-base"></div>
                <div class="handle-stick"><div class="handle-knob"></div></div>
            </div>
        </div>
    </div>

    <script>
        const config = { '🍒': 1.0, '🍋': 1.5, '🍇': 2.0, '💎': 3.0, '7️⃣': 5.0 };
        const symbols = Object.keys(config);
        const SYMBOL_HEIGHT = 110;
        let balance = 0, currentBet = 100, adminMode = null, isSpinning = false;

        const balanceEl = document.getElementById('balance');
        const betInput = document.getElementById('bet-input');
        const spinBtn = document.getElementById('spin-btn');
        const handle = document.getElementById('handle-container');
        const reelLists = [document.getElementById('reel1'), document.getElementById('reel2'), document.getElementById('reel3')];

        document.getElementById('start-btn').addEventListener('click', () => {
            balance = parseInt(document.getElementById('start-balance').value) || 0;
            document.getElementById('entry-screen').style.display = 'none';
            document.getElementById('game-screen').style.display = 'flex';
            updateUI(); initReels();
        });

        function initReels() {
            reelLists.forEach(reel => {
                let html = "";
                for(let i=0; i < 10; i++) html += symbols.map(s => `<li class="symbol">${s}</li>`).join('');
                reel.innerHTML = html;
            });
        }

        // 베팅금 직접 입력 감지
        betInput.addEventListener('change', () => {
            let val = parseInt(betInput.value) || 0;
            if (val < 100) val = 100;
            if (val > balance) val = balance;
            currentBet = val;
            updateUI();
        });

        function changeBet(amount) {
            if (isSpinning) return;
            currentBet = Math.max(100, Math.min(balance, currentBet + amount));
            updateUI();
        }

        function maxBet() { if(!isSpinning) { currentBet = balance; updateUI(); } }
        function resetBet() { if(!isSpinning) { currentBet = 100; updateUI(); } }

        window.addEventListener('keydown', (e) => {
            if (document.getElementById('game-screen').style.display === 'flex') {
                // 입력창 포커스 중에는 스페이스바 방지
                if (e.code === "Space" && document.activeElement !== betInput && !isSpinning) {
                    e.preventDefault(); spin();
                }
                if (e.key >= '1' && e.key <= '5') adminMode = parseInt(e.key) - 1;
                if (e.key === '9') adminMode = 'lose';
                if (e.key === '0') adminMode = null;
            }
        });

        async function spin() {
            if (balance < currentBet || currentBet <= 0) return;
            isSpinning = true; balance -= currentBet; updateUI(); spinBtn.disabled = true;
            handle.classList.add('pulling');
            setTimeout(() => handle.classList.remove('pulling'), 450);

            let results = [];
            if (adminMode === 'lose') {
                let f = Math.floor(Math.random() * symbols.length);
                results = [f, (f + 1) % symbols.length, Math.floor(Math.random() * symbols.length)];
            } else if (adminMode !== null) {
                results = [adminMode, adminMode, adminMode];
            } else {
                results = [0,0,0].map(() => Math.floor(Math.random() * symbols.length));
            }

            const promises = reelLists.map((reel, i) => {
                return new Promise(resolve => {
                    reel.style.transition = 'none'; reel.style.transform = `translateY(0)`; reel.offsetHeight; 
                    const move = (SYMBOL_HEIGHT * symbols.length * (5 + i)) + (results[i] * SYMBOL_HEIGHT);
                    reel.style.transition = `transform ${3 + i * 0.5}s cubic-bezier(0.15, 0, 0.15, 1)`;
                    reel.style.transform = `translateY(-${move}px)`;
                    setTimeout(resolve, 3000 + i * 500);
                });
            });

            await Promise.all(promises);
            checkResult(results, currentBet);
            adminMode = null; isSpinning = false; spinBtn.disabled = false;
            if (currentBet > balance) currentBet = Math.max(100, balance);
            updateUI();
        }

        function checkResult(indices, bet) {
            if (indices[0] === indices[1] && indices[1] === indices[2]) {
                const win = Math.floor(bet * config[symbols[indices[0]]]);
                balance += win;
                document.getElementById('message').innerHTML = `<span class="win-text">💰 WINNER! +${win.toLocaleString()}원</span>`;
            } else {
                document.getElementById('message').textContent = "TRY AGAIN!";
            }
        }

        function updateUI() {
            balanceEl.textContent = balance.toLocaleString();
            betInput.value = currentBet;
        }

        spinBtn.addEventListener('click', () => { if(!isSpinning) spin(); });
    </script>
</body>
</html>
