<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <title>JS Golden Slot - Ultimate Edition</title>
    <style>
        /* 기본 레이아웃 및 배경 */
        body { 
            font-family: 'Malgun Gothic', sans-serif; 
            text-align: center; 
            background: radial-gradient(circle, #444 0%, #111 100%); 
            color: white; 
            min-height: 100vh; margin: 0; 
            display: flex; flex-direction: column; align-items: center; justify-content: center; 
        }

        /* 공통 버튼 스타일 (골드 그라데이션) */
        .fancy-btn {
            padding: 15px 50px; 
            font-size: 24px; 
            font-weight: bold; 
            cursor: pointer; 
            background: linear-gradient(#ffd700, #ff8c00); 
            border: none; 
            border-radius: 50px; 
            color: #222; 
            box-shadow: 0 6px 0 #b8860b; 
            transition: 0.1s;
            outline: none;
        }
        .fancy-btn:active { transform: translateY(4px); box-shadow: 0 2px 0 #b8860b; }
        .fancy-btn:disabled { background: #666; box-shadow: none; color: #999; cursor: not-allowed; opacity: 0.7; }

        /* 입장 화면 */
        #entry-screen { 
            background: #333; padding: 50px; border-radius: 30px; 
            box-shadow: 0 0 40px rgba(0,0,0,0.8); border: 8px solid #b8860b; 
        }
        #entry-screen h2 { color: #ffd700; font-size: 32px; margin-top: 0; text-shadow: 0 0 10px rgba(255,215,0,0.5); }
        .entry-input-group { margin: 30px 0; }
        #start-balance { 
            padding: 12px; font-size: 24px; width: 180px; text-align: center; 
            border-radius: 10px; border: 3px solid #555; background: #222; color: #fff;
        }

        /* 게임 화면 */
        #game-screen { display: none; }
        .slot-machine { 
            background-color: #333; border: 12px solid #b8860b; border-radius: 30px; 
            padding: 30px; width: 500px; box-shadow: 0 20px 50px rgba(0,0,0,0.8); 
        }
        .status-bar { 
            display: flex; justify-content: space-between; background: #000; 
            padding: 15px 25px; border-radius: 15px; border: 2px solid #555; margin-bottom: 20px; 
        }
        .status-item { font-size: 20px; color: #ffd700; font-weight: bold; }

        /* 릴 섹션 */
        .slot-container { 
            display: flex; justify-content: center; background-color: #eee; 
            padding: 15px; border-radius: 15px; overflow: hidden; box-shadow: inset 0 0 15px rgba(0,0,0,0.5); 
        }
        .reel-window { width: 110px; height: 110px; border: 4px solid #888; margin: 0 8px; overflow: hidden; position: relative; background: white; border-radius: 8px; }
        .reel-list { list-style: none; margin: 0; padding: 0; position: absolute; width: 100%; top: 0; transition: transform 3s cubic-bezier(0.15, 0, 0.15, 1); }
        .symbol { height: 110px; line-height: 110px; font-size: 70px; color: black; text-align: center; }

        /* 베팅 컨트롤 */
        .bet-section { margin-top: 25px; background: rgba(0,0,0,0.3); padding: 15px; border-radius: 15px; }
        #bet-display { background: #111; color: #0f0; font-family: 'Courier New', monospace; font-size: 24px; padding: 5px 20px; border: 2px solid #444; border-radius: 5px; min-width: 100px; display: inline-block; }
        .bet-buttons { display: flex; gap: 5px; justify-content: center; margin-top: 10px; }
        .bet-btn { background: #555; border: 1px solid #777; color: white; padding: 8px 12px; border-radius: 5px; cursor: pointer; font-size: 14px; }
        .bet-btn:hover { background: #777; }
        .bet-btn.max { background: #b8860b; font-weight: bold; }
        .bet-btn.reset { background: #844; }

        #message { margin-top: 20px; font-size: 22px; height: 55px; font-weight: bold; line-height: 1.2; }
        .win-text { color: #ffd700; text-shadow: 0 0 10px #ff0; }
    </style>
</head>
<body>

    <div id="entry-screen">
        <h2>🎰 GOLDEN CASINO</h2>
        <div class="entry-input-group">
            <label style="display:block; margin-bottom:10px;">초기 자산을 충전하세요</label>
            <input type="number" id="start-balance" value="10000" min="100">
        </div>
        <button id="start-btn" class="fancy-btn">START GAME</button>
    </div>

    <div id="game-screen">
        <div class="slot-machine">
            <h1 style="color: #ffd700; margin: 0 0 15px 0;">🎰 GOLDEN SLOT</h1>
            
            <div class="status-bar">
                <div class="status-item">MONEY: <span id="balance">0</span></div>
                <div style="color: #aaa; font-size: 12px; text-align:right;">7️⃣x5 | 💎x3 | 🍇x2<br>🍋x1.5 | 🍒x1</div>
            </div>

            <div class="slot-container">
                <div class="reel-window"><ul id="reel1" class="reel-list"></ul></div>
                <div class="reel-window"><ul id="reel2" class="reel-list"></ul></div>
                <div class="reel-window"><ul id="reel3" class="reel-list"></ul></div>
            </div>

            <div class="bet-section">
                <div style="margin-bottom:10px;">
                    <span style="color:#aaa; font-weight:bold; margin-right:10px;">BET</span>
                    <div id="bet-display">100</div>
                </div>
                <div class="bet-buttons">
                    <button class="bet-btn" onclick="addBet(100)">+100</button>
                    <button class="bet-btn" onclick="addBet(500)">+500</button>
                    <button class="bet-btn" onclick="addBet(1000)">+1k</button>
                    <button class="bet-btn max" onclick="maxBet()">MAX</button>
                    <button class="bet-btn reset" onclick="resetBet()">RESET</button>
                </div>
            </div>

            <button id="spin-btn" class="fancy-btn" style="margin-top:25px; width: 100%;">SPIN! (Space)</button>
            <div id="message">환영합니다! 행운을 빕니다.</div>
        </div>
    </div>

    <script>
        const config = { '🍒': 1.0, '🍋': 1.5, '🍇': 2.0, '💎': 3.0, '7️⃣': 5.0 };
        const symbols = Object.keys(config);
        const SYMBOL_HEIGHT = 110;
        
        let balance = 0;
        let currentBet = 100;
        let adminMode = null; 
        let isSpinning = false;

        const balanceEl = document.getElementById('balance');
        const betDisplay = document.getElementById('bet-display');
        const spinBtn = document.getElementById('spin-btn');
        const reelLists = [document.getElementById('reel1'), document.getElementById('reel2'), document.getElementById('reel3')];

        // 입장 버튼 이벤트
        document.getElementById('start-btn').addEventListener('click', () => {
            balance = parseInt(document.getElementById('start-balance').value) || 0;
            if(balance <= 0) { alert("금액을 입력해주세요!"); return; }
            document.getElementById('entry-screen').style.display = 'none';
            document.getElementById('game-screen').style.display = 'block';
            updateUI();
            initReels();
        });

        function initReels() {
            reelLists.forEach(reel => {
                let html = "";
                for(let i=0; i < 8; i++) html += symbols.map(s => `<li class="symbol">${s}</li>`).join('');
                reel.innerHTML = html;
            });
        }

        // 베팅 기능
        function addBet(amount) { if(!isSpinning) { currentBet += amount; if(currentBet > balance) currentBet = balance; updateUI(); } }
        function resetBet() { if(!isSpinning) { currentBet = 100; updateUI(); } }
        function maxBet() { if(!isSpinning) { currentBet = balance; updateUI(); } }

        // 키보드 핸들러
        window.addEventListener('keydown', (e) => {
            if (document.getElementById('game-screen').style.display === 'block') {
                if ((e.code === "Space" || e.key === " ") && !isSpinning) { e.preventDefault(); spin(); }
                if (e.key >= '1' && e.key <= '5') adminMode = parseInt(e.key) - 1;
                if (e.key === '9') adminMode = 'lose';
                if (e.key === '0') adminMode = null;
            }
        });

        async function spin() {
            if (currentBet <= 0 || balance < currentBet) {
                document.getElementById('message').textContent = "잔액이 부족하거나 베팅이 0원입니다!";
                return;
            }

            isSpinning = true;
            balance -= currentBet;
            updateUI();
            spinBtn.disabled = true;
            document.getElementById('message').textContent = "가즈아아!!";

            let results = [];
            if (adminMode === 'lose') {
                let f = Math.floor(Math.random() * symbols.length);
                results = [f, (f + 1) % symbols.length, Math.floor(Math.random() * symbols.length)];
            } else if (adminMode !== null) {
                results = [adminMode, adminMode, adminMode];
            } else {
                results = [0,0,0].map(() => Math.floor(Math.random() * symbols.length));
            }

            const promises = reelLists.map((reel, i) => {
                return new Promise(resolve => {
                    reel.style.transition = 'none';
                    reel.style.transform = `translateY(0)`;
                    reel.offsetHeight; 
                    const move = (SYMBOL_HEIGHT * symbols.length * (4 + i)) + (results[i] * SYMBOL_HEIGHT);
                    reel.style.transition = `transform ${2.5 + i * 0.5}s cubic-bezier(0.15, 0, 0.15, 1)`;
                    reel.style.transform = `translateY(-${move}px)`;
                    setTimeout(() => resolve(), 2500 + i * 500);
                });
            });

            await Promise.all(promises);
            checkResult(results, currentBet);
            adminMode = null; 
            isSpinning = false;
            spinBtn.disabled = false;
            if (currentBet > balance) currentBet = Math.max(0, balance);
            updateUI();
        }

        function checkResult(indices, bet) {
            if (indices[0] === indices[1] && indices[1] === indices[2]) {
                const win = Math.floor(bet * config[symbols[indices[0]]]);
                balance += win;
                document.getElementById('message').innerHTML = `<span class="win-text">🎉 당첨입니다! 🎉<br>+${win.toLocaleString()}원 획득!</span>`;
            } else {
                document.getElementById('message').textContent = "꽝! 다시 한 번 도전해보세요.";
            }
            updateUI();
        }

        function updateUI() {
            balanceEl.textContent = balance.toLocaleString();
            betDisplay.textContent = currentBet.toLocaleString();
        }

        spinBtn.addEventListener('click', () => { if(!isSpinning) spin(); });
    </script>
</body>
</html>
